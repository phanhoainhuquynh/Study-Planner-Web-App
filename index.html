<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <div>
        <p class="eyebrow">Student Productivity App</p>
        <h1>Study Planner</h1>
        <p class="subtitle">Manage homework, plan study sessions, and track progress in one place.</p>
      </div>
      <div class="stats-card">
        <h2>Overview</h2>
        <div class="stat-row"><span>Total tasks</span><strong id="totalTasks">0</strong></div>
        <div class="stat-row"><span>Completed</span><strong id="completedTasks">0</strong></div>
        <div class="stat-row"><span>Pending</span><strong id="pendingTasks">0</strong></div>
      </div>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>Add a Task</h2>
        <form id="taskForm">
          <label>Task title
            <input type="text" id="title" placeholder="e.g. Finish Java homework" required />
          </label>

          <label>Course
            <input type="text" id="course" placeholder="e.g. Software Design" required />
          </label>

          <label>Due date
            <input type="date" id="dueDate" required />
          </label>

          <label>Priority
            <select id="priority">
              <option value="High">High</option>
              <option value="Medium" selected>Medium</option>
              <option value="Low">Low</option>
            </select>
          </label>

          <button type="submit">Add task</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Your Tasks</h2>
          <button id="clearCompleted" class="secondary-btn">Clear completed</button>
        </div>
        <div id="taskList" class="task-list"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
